<script>
/* ─── Password Check ─── */
(function(){
  /* Hash: SHA-256 du mot de passe. Pour changer le mot de passe :
     1. Ouvre la console du navigateur (F12)
     2. Tape : crypto.subtle.digest('SHA-256', new TextEncoder().encode('tonNouveauMdp')).then(b => console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
     3. Remplace le hash ci-dessous par le resultat */
  const HASH = "eb0ee4c2049b56bf0856edf73dbf66a3a4d978f9eaef1248f87de8551e2b37e6";

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2, '0')).join('');
  }

  /* Si deja authentifie dans cette session */
  if (sessionStorage.getItem('tf-auth') === '1') {
    document.getElementById('lockscreen').style.display = 'none';
    document.getElementById('root').style.display = '';
    return;
  }

  const inp = document.getElementById('pw-input');
  const btn = document.getElementById('pw-btn');
  const err = document.getElementById('pw-error');

  async function tryLogin() {
    const val = inp.value;
    if (!val) { err.textContent = 'Veuillez entrer un mot de passe'; return; }
    const h = await sha256(val);
    if (h === HASH) {
      sessionStorage.setItem('tf-auth', '1');
      document.getElementById('lockscreen').style.display = 'none';
      document.getElementById('root').style.display = '';
    } else {
      err.textContent = 'Mot de passe incorrect';
      inp.value = '';
      inp.focus();
      inp.style.borderColor = '#D94F4F';
      setTimeout(() => { inp.style.borderColor = 'rgba(0,0,0,0.09)'; }, 1500);
    }
  }

  btn.addEventListener('click', tryLogin);
  inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') tryLogin(); });
})();
</script>

/* ─── SVG Donut ─── */
function PieChart({ segments, size = 180 }) {
  const T = useContext(ThemeCtx);
  const total = segments.reduce((s, g) => s + g.value, 0);
  if (total === 0) return h("div", { style: { width: size, height: size, display: "flex", alignItems: "center", justifyContent: "center", borderRadius: "50%", background: T.pieBg } },
    h("span", { style: { color: T.textFaint, fontSize: 13, fontWeight: 700 } }, "Aucune tache")
  );
  const r = size / 2, cx = r, cy = r, inner = r * 0.58;
  let cum = -Math.PI / 2;
  const paths = segments.filter(s => s.value > 0).map(seg => {
    const a = (seg.value / total) * 2 * Math.PI;
    const s1 = { x: cx + r * Math.cos(cum), y: cy + r * Math.sin(cum) };
    const e = cum + a;
    const s2 = { x: cx + r * Math.cos(e), y: cy + r * Math.sin(e) };
    const i1 = { x: cx + inner * Math.cos(e), y: cy + inner * Math.sin(e) };
    const i2 = { x: cx + inner * Math.cos(cum), y: cy + inner * Math.sin(cum) };
    const lg = a > Math.PI ? 1 : 0;
    const d = `M ${s1.x} ${s1.y} A ${r} ${r} 0 ${lg} 1 ${s2.x} ${s2.y} L ${i1.x} ${i1.y} A ${inner} ${inner} 0 ${lg} 0 ${i2.x} ${i2.y} Z`;
    cum = e;
    return { d, color: seg.color, label: seg.label };
  });
  return h("svg", { width: size, height: size, viewBox: `0 0 ${size} ${size}` },
    ...paths.map((p, i) => h("path", { key: i, d: p.d, fill: p.color, stroke: T.pieStroke, strokeWidth: "2" })),
    h("text", { x: cx, y: cy - 4, textAnchor: "middle", fill: T.pieText, fontSize: "26", fontWeight: "900", fontFamily: "'Nunito',sans-serif" }, total),
    h("text", { x: cx, y: cy + 14, textAnchor: "middle", fill: T.pieSub, fontSize: "10", fontWeight: "700", fontFamily: "'Nunito',sans-serif" }, "taches actives")
  );
}

/* ─── Checklist Progress ─── */
function ChecklistProgress({ checklist }) {
  if (!checklist || checklist.length === 0) return null;
  const done = checklist.filter(c => c.done).length;
  const total = checklist.length;
  const pct = Math.round((done / total) * 100);
  return h("div", { style: { display: "flex", alignItems: "center", gap: 5 } },
    h("div", { style: { width: 40, height: 4, borderRadius: 2, background: "rgba(128,128,128,0.15)", overflow: "hidden" } },
      h("div", { style: { width: pct + "%", height: "100%", borderRadius: 2, background: done === total ? "#4CAF7D" : "#E8A838", transition: "width .3s" } })
    ),
    h("span", { style: { fontSize: 9, fontWeight: 800, color: done === total ? "#4CAF7D" : "rgba(128,128,128,0.5)" } }, done + "/" + total)
  );
}

/* ─── Day Planner ("Ma journée") ─── */
const DAY_KEY = "taskflow-dayplan";
function loadDayPlan() { try { const r = localStorage.getItem(DAY_KEY); return r ? JSON.parse(r) : []; } catch { return []; } }
function saveDayPlan(d) { try { localStorage.setItem(DAY_KEY, JSON.stringify(d)); } catch(e) { console.error(e); } }

function DayPlanner({ tasks, cats, getCat, btnP, btnG, inp, lbl, F }) {
  const T = useContext(ThemeCtx);
  const [items, setItems] = useState(() => loadDayPlan());
  const [adding, setAdding] = useState(false);
  const [pickCat, setPickCat] = useState("");
  const [pickSub, setPickSub] = useState("");
  const [pickTask, setPickTask] = useState("");
  const [pickStart, setPickStart] = useState("09:00");
  const [pickDur, setPickDur] = useState(60);
  const [dragId, setDragId] = useState(null);
  const [dragStartY, setDragStartY] = useState(0);
  const [dragOrigTop, setDragOrigTop] = useState(0);
  const [didDrag, setDidDrag] = useState(false);
  const [editId, setEditId] = useState(null);
  const [editStart, setEditStart] = useState("09:00");
  const [editDur, setEditDur] = useState(60);

  const persistDay = (d) => { setItems(d); saveDayPlan(d); };

  const START_H = 6, END_H = 23, HOUR_PX = 56;
  const totalH = END_H - START_H;

  const hourToY = (hr, mn) => ((hr - START_H) + mn / 60) * HOUR_PX;
  const yToTime = (y) => {
    const totalMin = Math.max(0, Math.round((y / HOUR_PX) * 60 / 15) * 15);
    const hr = START_H + Math.floor(totalMin / 60);
    const mn = totalMin % 60;
    return { hr: Math.min(hr, END_H - 1), mn };
  };

  const filteredTasks = tasks.filter(t => {
    if (t.status === "done") return false;
    if (pickCat === "__none__") return !t.catId;
    if (pickCat && t.catId !== pickCat) return false;
    if (pickSub && t.subId !== pickSub) return false;
    return true;
  });

  const selectedCat = pickCat && pickCat !== "__none__" ? getCat(pickCat) : null;

  const addItem = () => {
    if (!pickTask) return;
    const [hh, mm] = pickStart.split(":").map(Number);
    persistDay([...items, { id: uid(), taskId: pickTask, startHr: hh, startMin: mm || 0, durMin: pickDur }]);
    setAdding(false); setPickCat(""); setPickSub(""); setPickTask(""); setPickStart("09:00"); setPickDur(60);
  };

  const removeItem = (id) => persistDay(items.filter(i => i.id !== id));

  const onMouseDown = (e, item) => {
    e.preventDefault(); e.stopPropagation();
    setDragId(item.id);
    setDragStartY(e.clientY);
    setDragOrigTop(hourToY(item.startHr, item.startMin));
    setDidDrag(false);
  };

  const openEdit = (item) => {
    setEditId(item.id);
    setEditStart(fmtTime(item.startHr, item.startMin));
    setEditDur(item.durMin);
  };

  const saveEdit = () => {
    if (!editId) return;
    const [hh, mm] = editStart.split(":").map(Number);
    persistDay(items.map(it => it.id === editId ? { ...it, startHr: hh || 0, startMin: mm || 0, durMin: editDur } : it));
    setEditId(null);
  };

  useEffect(() => {
    if (!dragId) return;
    const onMove = (e) => {
      const dy = e.clientY - dragStartY;
      if (Math.abs(dy) > 3) setDidDrag(true);
      const newTop = Math.max(0, Math.min(dragOrigTop + dy, totalH * HOUR_PX - 20));
      const { hr, mn } = yToTime(newTop);
      setItems(prev => prev.map(it => it.id === dragId ? { ...it, startHr: hr, startMin: mn } : it));
    };
    const onUp = () => {
      if (!didDrag) {
        const item = items.find(it => it.id === dragId);
        if (item) openEdit(item);
      }
      setDragId(null);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
  }, [dragId, dragStartY, dragOrigTop, didDrag]);

  useEffect(() => { if (!dragId) saveDayPlan(items); }, [dragId]);

  const getBlockColor = (taskId) => {
    const task = tasks.find(t => t.id === taskId);
    if (!task || !task.catId) return T.dotTodo;
    const cat = getCat(task.catId);
    return cat ? cat.color : T.dotTodo;
  };
  const getTaskTitle = (taskId) => { const task = tasks.find(t => t.id === taskId); return task ? task.title : "(supprimee)"; };

  const hours = []; for (let i = START_H; i < END_H; i++) hours.push(i);

  const fmtTime = (hr, mn) => (hr < 10 ? "0" : "") + hr + ":" + (mn < 10 ? "0" : "") + mn;
  const fmtEnd = (hr, mn, dur) => { const end = hr * 60 + mn + dur; return fmtTime(Math.floor(end / 60), end % 60); };

  return h("div", { style: { background: T.card, borderRadius: 18, border: "1px solid " + T.border, padding: "18px 16px", width: 300, flexShrink: 0, transition: "background .3s", display: "flex", flexDirection: "column", maxHeight: "calc(100vh - 120px)" } },
    h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 } },
      h("div", { style: { fontSize: 14, fontWeight: 900, color: T.text, display: "flex", alignItems: "center", gap: 6 } }, "\uD83D\uDCC5 Ma journee"),
      h("div", { style: { display: "flex", gap: 5 } },
        items.length > 0 && h("button", { onClick: () => { if (confirm("Vider tout le planning de la journee ?")) persistDay([]); }, title: "Vider la journee", style: { background: "none", border: "1px solid rgba(217,79,79,0.2)", borderRadius: 8, padding: "5px 9px", fontSize: 11, fontWeight: 800, cursor: "pointer", color: "#D94F4F", fontFamily: F, transition: "all .2s" } }, "\uD83D\uDDD1"),
        h("button", { onClick: () => setAdding(!adding), style: { ...btnP, padding: "6px 12px", fontSize: 11 } }, adding ? "Fermer" : "+ Ajouter")
      )
    ),

    adding && h("div", { style: { background: T.sectionBg, borderRadius: 10, padding: "12px", border: "1px solid " + T.sectionBorder, marginBottom: 12, display: "flex", flexDirection: "column", gap: 8 } },
      h("select", { value: pickCat, onChange: e => { setPickCat(e.target.value); setPickSub(""); setPickTask(""); }, style: { ...inp, padding: "8px 10px", fontSize: 12 } },
        h("option", { value: "" }, "-- Toutes les taches --"),
        h("option", { value: "__none__" }, "Taches rapides"),
        ...cats.map(c => h("option", { key: c.id, value: c.id }, c.name))
      ),
      selectedCat && selectedCat.subs.length > 0 && h("select", { value: pickSub, onChange: e => { setPickSub(e.target.value); setPickTask(""); }, style: { ...inp, padding: "8px 10px", fontSize: 12 } },
        h("option", { value: "" }, "-- Toutes sous-cat --"),
        ...selectedCat.subs.map(s => h("option", { key: s.id, value: s.id }, s.num + ". " + s.name))
      ),
      h("select", { value: pickTask, onChange: e => setPickTask(e.target.value), style: { ...inp, padding: "8px 10px", fontSize: 12 } },
        h("option", { value: "" }, "-- Choisir une tache --"),
        ...filteredTasks.map(t => h("option", { key: t.id, value: t.id }, t.title))
      ),
      h("div", { style: { display: "flex", gap: 6 } },
        h("div", { style: { flex: 1 } },
          h("div", { style: { ...lbl, fontSize: 9, marginBottom: 3 } }, "Debut"),
          h("input", { type: "time", value: pickStart, onChange: e => setPickStart(e.target.value), style: { ...inp, padding: "6px 8px", fontSize: 12 } })
        ),
        h("div", { style: { flex: 1 } },
          h("div", { style: { ...lbl, fontSize: 9, marginBottom: 3 } }, "Duree"),
          h("select", { value: pickDur, onChange: e => setPickDur(Number(e.target.value)), style: { ...inp, padding: "6px 8px", fontSize: 12 } },
            ...[15,30,45,60,90,120,150,180,240].map(d => h("option", { key: d, value: d }, d >= 60 ? (d / 60) + "h" + (d % 60 ? (d % 60) + "m" : "") : d + "min"))
          )
        )
      ),
      h("button", { onClick: addItem, style: { ...btnP, padding: "7px 14px", fontSize: 12, opacity: pickTask ? 1 : 0.35 } }, "Placer dans ma journee")
    ),

    h("div", { style: { flex: 1, overflowY: "auto", position: "relative", marginTop: 4 } },
      h("div", { style: { position: "relative", height: totalH * HOUR_PX } },
        ...hours.map(hr =>
          h("div", { key: hr, style: { position: "absolute", top: (hr - START_H) * HOUR_PX, left: 0, right: 0, height: HOUR_PX, borderTop: "1px solid " + T.border } },
            h("span", { style: { position: "absolute", top: -1, left: 0, fontSize: 9, fontWeight: 800, color: T.textFaint, userSelect: "none", lineHeight: 1 } }, fmtTime(hr, 0))
          )
        ),
        ...items.map(item => {
          const top = hourToY(item.startHr, item.startMin);
          const height = Math.max(20, (item.durMin / 60) * HOUR_PX);
          const color = getBlockColor(item.taskId);
          const title = getTaskTitle(item.taskId);
          return h("div", {
            key: item.id, onMouseDown: e => onMouseDown(e, item),
            style: {
              position: "absolute", top, left: 36, right: 4, height,
              background: color + "25", borderLeft: "3px solid " + color, borderRadius: 6,
              padding: "3px 6px", cursor: dragId === item.id ? "grabbing" : "grab",
              fontSize: 11, fontWeight: 700, color: T.text, overflow: "hidden",
              display: "flex", alignItems: "flex-start", justifyContent: "space-between",
              zIndex: dragId === item.id ? 50 : 10, transition: dragId === item.id ? "none" : "top .15s ease",
              userSelect: "none", boxShadow: dragId === item.id ? "0 4px 12px rgba(0,0,0,0.15)" : "none"
            }
          },
            h("div", { style: { flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", lineHeight: 1.3 } },
              h("div", { style: { fontSize: 10, fontWeight: 800 } }, title),
              height > 28 && h("div", { style: { fontSize: 9, fontWeight: 600, color: T.textMuted, marginTop: 1 } }, fmtTime(item.startHr, item.startMin) + " - " + fmtEnd(item.startHr, item.startMin, item.durMin))
            ),
            h("button", { onClick: e => { e.stopPropagation(); removeItem(item.id); },
              style: { background: "none", border: "none", cursor: "pointer", color: T.textFaint, fontSize: 12, fontWeight: 900, padding: "0 2px", lineHeight: 1, flexShrink: 0 },
              onMouseDown: e => e.stopPropagation(),
              onMouseEnter: e => e.currentTarget.style.color = "#D94F4F", onMouseLeave: e => e.currentTarget.style.color = T.textFaint
            }, "\u00D7")
          );
        }),
        /* Edit popover */
        (() => {
          if (!editId) return null;
          const ei = items.find(it => it.id === editId);
          if (!ei) return null;
          const popTop = Math.min(hourToY(ei.startHr, ei.startMin), (totalH - 3) * HOUR_PX);
          return h("div", { onClick: e => e.stopPropagation(), onMouseDown: e => e.stopPropagation(), style: {
            position: "absolute", top: popTop, left: 20, right: -4, zIndex: 100,
            background: T.modalBg, borderRadius: 12, padding: "12px", border: "1px solid " + T.borderStrong,
            boxShadow: "0 8px 24px rgba(0,0,0,0.18)", display: "flex", flexDirection: "column", gap: 8
          } },
            h("div", { style: { fontSize: 12, fontWeight: 800, color: T.text, marginBottom: 2 } }, getTaskTitle(ei.taskId)),
            h("div", { style: { display: "flex", gap: 6 } },
              h("div", { style: { flex: 1 } },
                h("div", { style: { ...lbl, fontSize: 9, marginBottom: 3 } }, "Debut"),
                h("input", { type: "time", value: editStart, onChange: e => setEditStart(e.target.value), style: { ...inp, padding: "6px 8px", fontSize: 12 } })
              ),
              h("div", { style: { flex: 1 } },
                h("div", { style: { ...lbl, fontSize: 9, marginBottom: 3 } }, "Duree"),
                h("select", { value: editDur, onChange: e => setEditDur(Number(e.target.value)), style: { ...inp, padding: "6px 8px", fontSize: 12 } },
                  ...[15,30,45,60,90,120,150,180,240].map(d => h("option", { key: d, value: d }, d >= 60 ? (d / 60) + "h" + (d % 60 ? (d % 60) + "m" : "") : d + "min"))
                )
              )
            ),
            h("div", { style: { display: "flex", gap: 6, justifyContent: "flex-end" } },
              h("button", { onClick: () => setEditId(null), style: { ...btnG, padding: "5px 10px", fontSize: 11 } }, "Annuler"),
              h("button", { onClick: saveEdit, style: { ...btnP, padding: "5px 12px", fontSize: 11 } }, "OK")
            )
          );
        })()
      )
    ),

    items.length > 0 && h("div", { style: { marginTop: 8, paddingTop: 8, borderTop: "1px solid " + T.border, fontSize: 10, fontWeight: 700, color: T.textMuted, textAlign: "center" } },
      items.length + " tache" + (items.length > 1 ? "s" : "") + " \u2022 " + (Math.round(items.reduce((s, i) => s + i.durMin, 0) / 60 * 10) / 10) + "h planifiee" + (items.reduce((s, i) => s + i.durMin, 0) > 60 ? "s" : "")
    )
  );
}

    }

/* Theme context */
const ThemeCtx = createContext(THEMES.light);

/* ─── Notes System (OneNote style) ─── */
const NOTES_KEY = "taskflow-notes";
function loadNotes() { try { const r = localStorage.getItem(NOTES_KEY); return r ? JSON.parse(r) : []; } catch { return []; } }
function saveNotes(d) { try { localStorage.setItem(NOTES_KEY, JSON.stringify(d)); } catch(e) { console.error(e); } }

/* Full-page OneNote-style view */
function NotesPage({ notes, persistN, btnP, btnG, inp, lbl, F }) {
  const T = useContext(ThemeCtx);
  const [activeNoteId, setActiveNoteId] = useState(notes.length > 0 ? notes[0].id : null);
  const [activeSubId, setActiveSubId] = useState(null);
  const [adding, setAdding] = useState(false);
  const [addTitle, setAddTitle] = useState("");
  const [addingSub, setAddingSub] = useState(false);
  const [subTitle, setSubTitle] = useState("");
  const [editId, setEditId] = useState(null);
  const [editText, setEditText] = useState("");

  const activeNote = notes.find(n => n.id === activeNoteId);
  const activeSub = activeNote ? activeNote.subs.find(s => s.id === activeSubId) : null;

  const addNote = () => { if (!addTitle.trim()) return; const nn = { id: uid(), title: addTitle.trim(), content: "", subs: [] }; persistN([...notes, nn]); setActiveNoteId(nn.id); setActiveSubId(null); setAddTitle(""); setAdding(false); };
  const deleteNote = (id) => { if (!confirm("Supprimer cette note ?")) return; const nn = notes.filter(n => n.id !== id); persistN(nn); if (activeNoteId === id) { setActiveNoteId(nn.length > 0 ? nn[0].id : null); setActiveSubId(null); } };
  const renameNote = (id) => { if (!editText.trim()) return; persistN(notes.map(n => n.id === id ? { ...n, title: editText.trim() } : n)); setEditId(null); };
  const updateNoteContent = (id, content) => persistN(notes.map(n => n.id === id ? { ...n, content } : n));

  const addSubNote = () => { if (!subTitle.trim() || !activeNote) return; const ns = { id: uid(), title: subTitle.trim(), content: "" }; persistN(notes.map(n => n.id === activeNoteId ? { ...n, subs: [...n.subs, ns] } : n)); setActiveSubId(ns.id); setSubTitle(""); setAddingSub(false); };
  const deleteSubNote = (subId) => { persistN(notes.map(n => n.id === activeNoteId ? { ...n, subs: n.subs.filter(s => s.id !== subId) } : n)); if (activeSubId === subId) setActiveSubId(null); };
  const renameSubNote = (subId) => { if (!editText.trim()) return; persistN(notes.map(n => n.id === activeNoteId ? { ...n, subs: n.subs.map(s => s.id === subId ? { ...s, title: editText.trim() } : s) } : n)); setEditId(null); };
  const updateSubContent = (subId, content) => persistN(notes.map(n => n.id === activeNoteId ? { ...n, subs: n.subs.map(s => s.id === subId ? { ...s, content } : s) } : n));

  const currentContent = activeSub ? activeSub.content : (activeNote ? activeNote.content : "");
  const updateCurrentContent = (c) => { if (activeSub) updateSubContent(activeSub.id, c); else if (activeNote) updateNoteContent(activeNote.id, c); };

  return h("div", { style: { display: "flex", gap: 0, height: "calc(100vh - 120px)", borderRadius: 18, overflow: "hidden", border: "1px solid " + T.border } },
    /* Sidebar */
    h("div", { style: { width: 240, flexShrink: 0, background: T.headerBg, borderRight: "1px solid " + T.border, display: "flex", flexDirection: "column", transition: "background .3s" } },
      /* Sidebar header */
      h("div", { style: { padding: "14px 12px 10px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid " + T.border } },
        h("div", { style: { fontSize: 14, fontWeight: 900, color: T.text } }, "\uD83D\uDCCB Notes"),
        h("button", { onClick: () => setAdding(!adding), style: { background: T.btnPrimBg, color: T.btnPrimText, border: "none", borderRadius: 6, width: 28, height: 28, cursor: "pointer", fontSize: 16, fontWeight: 900, display: "flex", alignItems: "center", justifyContent: "center" } }, "+")
      ),
      adding && h("div", { style: { padding: "8px 10px", borderBottom: "1px solid " + T.border } },
        h("input", { value: addTitle, onChange: e => setAddTitle(e.target.value), onKeyDown: e => { if (e.key === "Enter") addNote(); if (e.key === "Escape") setAdding(false); }, placeholder: "Nouvelle note...", autoFocus: true, style: { ...inp, padding: "7px 10px", fontSize: 12, marginBottom: 4 } }),
        h("div", { style: { display: "flex", gap: 4 } },
          h("button", { onClick: addNote, style: { ...btnP, padding: "5px 10px", fontSize: 11, flex: 1 } }, "Creer"),
          h("button", { onClick: () => setAdding(false), style: { ...btnG, padding: "5px 10px", fontSize: 11 } }, "\u00D7")
        )
      ),
      /* Notes list */
      h("div", { style: { flex: 1, overflowY: "auto", padding: "4px 0" } },
        ...notes.map(n =>
          h("div", { key: n.id },
            h("div", { onClick: () => { setActiveNoteId(n.id); setActiveSubId(null); }, style: {
              display: "flex", alignItems: "center", gap: 8, padding: "10px 12px", cursor: "pointer",
              background: activeNoteId === n.id && !activeSubId ? T.kanbanBg : "transparent",
              borderLeft: activeNoteId === n.id && !activeSubId ? "3px solid " + T.btnPrimBg : "3px solid transparent"
            } },
              h("span", { style: { fontSize: 14 } }, "\uD83D\uDCC4"),
              editId === n.id
                ? h("input", { value: editText, onChange: e => setEditText(e.target.value), onKeyDown: e => { if (e.key === "Enter") renameNote(n.id); if (e.key === "Escape") setEditId(null); }, onClick: e => e.stopPropagation(), autoFocus: true, style: { ...inp, flex: 1, padding: "3px 6px", fontSize: 12 } })
                : h("span", { style: { flex: 1, fontSize: 13, fontWeight: 700, color: T.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, n.title),
              h("button", { onClick: e => { e.stopPropagation(); setEditId(n.id); setEditText(n.title); }, style: { background: "none", border: "none", cursor: "pointer", color: T.textFaint, fontSize: 11, padding: "2px", opacity: 0.4 }, onMouseEnter: e => e.currentTarget.style.opacity = 1, onMouseLeave: e => e.currentTarget.style.opacity = 0.4 }, "\u270F"),
              h("button", { onClick: e => { e.stopPropagation(); deleteNote(n.id); }, style: { background: "none", border: "none", cursor: "pointer", color: T.textFaint, fontSize: 13, padding: "2px" }, onMouseEnter: e => e.currentTarget.style.color = "#D94F4F", onMouseLeave: e => e.currentTarget.style.color = T.textFaint }, "\u00D7")
            ),
            activeNoteId === n.id && n.subs.map(s =>
              h("div", { key: s.id, onClick: () => setActiveSubId(s.id), style: {
                display: "flex", alignItems: "center", gap: 6, padding: "7px 12px 7px 38px", cursor: "pointer",
                background: activeSubId === s.id ? T.kanbanBg : "transparent",
                borderLeft: activeSubId === s.id ? "3px solid " + T.dotDoing : "3px solid transparent"
              } },
                h("span", { style: { fontSize: 10, color: T.textFaint } }, "\u2514"),
                editId === s.id
                  ? h("input", { value: editText, onChange: e => setEditText(e.target.value), onKeyDown: e => { if (e.key === "Enter") renameSubNote(s.id); if (e.key === "Escape") setEditId(null); }, onClick: e => e.stopPropagation(), autoFocus: true, style: { ...inp, flex: 1, padding: "2px 6px", fontSize: 11 } })
                  : h("span", { style: { flex: 1, fontSize: 12, fontWeight: 600, color: T.textSoft, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, s.title),
                h("button", { onClick: e => { e.stopPropagation(); setEditId(s.id); setEditText(s.title); }, style: { background: "none", border: "none", cursor: "pointer", color: T.textFaint, fontSize: 9, padding: "2px", opacity: 0.3 }, onMouseEnter: e => e.currentTarget.style.opacity = 1, onMouseLeave: e => e.currentTarget.style.opacity = 0.3 }, "\u270F"),
                h("button", { onClick: e => { e.stopPropagation(); deleteSubNote(s.id); }, style: { background: "none", border: "none", cursor: "pointer", color: T.textFaint, fontSize: 11, padding: "2px" }, onMouseEnter: e => e.currentTarget.style.color = "#D94F4F", onMouseLeave: e => e.currentTarget.style.color = T.textFaint }, "\u00D7")
              )
            ),
            activeNoteId === n.id && h("div", { style: { padding: "3px 12px 8px 38px" } },
              addingSub
                ? h("div", { style: { display: "flex", gap: 3 } },
                    h("input", { value: subTitle, onChange: e => setSubTitle(e.target.value), onKeyDown: e => { if (e.key === "Enter") addSubNote(); if (e.key === "Escape") setAddingSub(false); }, placeholder: "Sous-note...", autoFocus: true, style: { ...inp, flex: 1, padding: "3px 6px", fontSize: 11 } }),
                    h("button", { onClick: addSubNote, style: { ...btnP, padding: "3px 6px", fontSize: 10 } }, "\u2713"),
                    h("button", { onClick: () => setAddingSub(false), style: { ...btnG, padding: "3px 6px", fontSize: 10 } }, "\u00D7")
                  )
                : h("button", { onClick: () => setAddingSub(true), style: { background: "none", border: "none", cursor: "pointer", color: T.textFaint, fontSize: 10, fontWeight: 700, fontFamily: F, padding: "2px 0" } }, "+ sous-note")
            )
          )
        ),
        notes.length === 0 && h("div", { style: { textAlign: "center", padding: "30px 14px", color: T.textFaint, fontSize: 12, fontWeight: 600 } }, "Cliquez + pour creer une note")
      )
    ),
    /* Editor */
    h("div", { style: { flex: 1, background: T.card, display: "flex", flexDirection: "column", transition: "background .3s" } },
      activeNote
        ? h("div", { style: { flex: 1, display: "flex", flexDirection: "column" } },
            h("div", { style: { padding: "18px 28px 14px", borderBottom: "1px solid " + T.border } },
              activeSub && h("div", { style: { fontSize: 11, fontWeight: 700, color: T.textFaint, marginBottom: 4 } }, activeNote.title + " \u203A " + activeSub.title),
              h("div", { style: { fontSize: 22, fontWeight: 900, color: T.text } }, activeSub ? activeSub.title : activeNote.title)
            ),
            h("div", { style: { flex: 1 } },
              h("textarea", { value: currentContent, onChange: e => updateCurrentContent(e.target.value), placeholder: "Ecrivez ici...", style: {
                width: "100%", height: "100%", border: "none", outline: "none", resize: "none", padding: "20px 28px",
                fontSize: 14, fontWeight: 500, lineHeight: 1.8, color: T.text, background: "transparent", fontFamily: F, boxSizing: "border-box"
              } })
            )
          )
        : h("div", { style: { flex: 1, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 8 } },
            h("div", { style: { fontSize: 40, opacity: 0.15 } }, "\uD83D\uDCCB"),
            h("div", { style: { fontSize: 14, fontWeight: 700, color: T.textFaint } }, "Selectionnez ou creez une note")
          )
    )
  );
}


/* ===================== MAIN APP ===================== */
function App() {

                  onClick: () => { setActiveCatId(cat.id); setActiveSubId(null); setView("category"); },
                  style: { background: T.card, borderRadius: 16, padding: "18px 20px", cursor: "pointer", border: "1px solid " + T.border, borderLeftWidth: 5, borderLeftColor: cat.color, borderLeftStyle: "solid", transition: "all .2s" },
                  onMouseEnter: e => { e.currentTarget.style.boxShadow = T.cardHover; e.currentTarget.style.transform = "translateY(-2px)"; },
                  onMouseLeave: e => { e.currentTarget.style.boxShadow = "none"; e.currentTarget.style.transform = "none"; }
                },
                  h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 } },
                    h("span", { style: { fontSize: 15, fontWeight: 800, color: T.text } }, cat.name),
                    h("div", { style: { display: "flex", gap: 4 }, onClick: e => e.stopPropagation() },
                      h("button", { onClick: () => { setCatForm({ name: cat.name, color: cat.color, editId: cat.id }); setCatModal(true); }, style: { background: "none", border: "none", cursor: "pointer", fontSize: 12, color: T.textFaint, padding: "3px 5px", borderRadius: 5, fontWeight: 700, fontFamily: F }, onMouseEnter: e => e.currentTarget.style.color = T.textSoft, onMouseLeave: e => e.currentTarget.style.color = T.textFaint }, "Editer"),
                      h("button", { onClick: () => deleteCategory(cat.id), style: { background: "none", border: "none", cursor: "pointer", fontSize: 12, color: T.textFaint, padding: "3px 5px", borderRadius: 5, fontWeight: 700, fontFamily: F }, onMouseEnter: e => e.currentTarget.style.color = "#D94F4F", onMouseLeave: e => e.currentTarget.style.color = T.textFaint }, "Suppr.")
                    )
                  ),
                  h("div", { style: { display: "flex", gap: 12, fontSize: 12, fontWeight: 700, marginBottom: cat.subs.length ? 8 : 0 } },
                    h("span", { style: { color: T.textMuted } }, pending + " active" + (pending > 1 ? "s" : "")),
                    h("span", { style: { color: T.textFaint } }, done + " terminee" + (done > 1 ? "s" : ""))
                  ),
                  cat.subs.length > 0 && h("div", { style: { display: "flex", gap: 5, flexWrap: "wrap" } },
                    ...cat.subs.map(s => h("span", { key: s.id, style: { fontSize: 10, fontWeight: 700, padding: "2px 9px", borderRadius: 5, background: `${cat.color}22`, color: T.textSoft } }, s.num + ". " + s.name))
                  )
                );
              })
            )
          ),

          cats.length === 0 && uncatTasks.length === 0 && h("div", { style: { textAlign: "center", padding: "70px 20px" } },
            h("div", { style: { fontSize: 38, fontWeight: 900, color: T.textGhost, marginBottom: 10 } }, "TaskFlow"),
            h("div", { style: { fontSize: 15, fontWeight: 700, color: T.textFaint } }, "Creez une categorie ou une tache rapide pour commencer")
          )
          ),
          /* Right: Day Planner */
          h(DayPlanner, { tasks, cats, getCat, btnP, btnG, inp, lbl, F })
        ),

        /* NOTES PAGE (OneNote style) */
        !searchQuery.trim() && view === "notes" && h(NotesPage, { notes: notesData, persistN, btnP, btnG, inp, lbl, F }),

        /* CATEGORY KANBAN */
        !searchQuery.trim() && view === "category" && activeCat && h("div", null,
          h("div", { style: { display: "flex", alignItems: "center", gap: 12, marginBottom: 18, flexWrap: "wrap" } },
            h("div", { style: { width: 14, height: 14, borderRadius: 5, background: activeCat.color } }),
            h("h2", { style: { fontSize: 20, fontWeight: 900, letterSpacing: "-0.02em", color: T.text } }, activeCat.name),
            h("div", { style: { marginLeft: "auto", display: "flex", gap: 7, flexWrap: "wrap" } },
              h("button", { onClick: () => { setSubForm({ name: "", parentId: activeCatId, editId: null }); setSubModal(true); }, style: btnG }, "+ Sous-categorie"),
              h("button", { onClick: () => { setTaskForm(newTaskForm(activeCatId, activeSubId)); setTaskModal(true); }, style: btnP }, "+ Tache")
            )
          ),
          activeCat.subs.length > 0 && h("div", { style: { display: "flex", gap: 5, marginBottom: 18, flexWrap: "wrap", padding: 4, background: T.card, borderRadius: 12, border: "1px solid " + T.border } },
            h("button", { onClick: () => setActiveSubId(null), style: { padding: "7px 14px", borderRadius: 9, border: "none", cursor: "pointer", fontSize: 13, fontWeight: 800, background: !activeSubId ? T.btnGhostBg : "transparent", color: !activeSubId ? T.text : T.textMuted, fontFamily: F } }, "Tout"),
            ...activeCat.subs.map(s =>
              h("div", { key: s.id, style: { display: "flex", alignItems: "center" } },
                h("button", { onClick: () => setActiveSubId(s.id), style: { padding: "7px 12px", borderRadius: 9, border: "none", cursor: "pointer", fontSize: 13, fontWeight: 700, background: activeSubId === s.id ? `${activeCat.color}20` : "transparent", color: activeSubId === s.id ? T.text : T.textMuted, fontFamily: F } }, s.num + ". " + s.name),
                h("button", { onClick: () => { setSubForm({ name: s.name, parentId: activeCatId, editId: s.id }); setSubModal(true); }, style: { background: "none", border: "none", cursor: "pointer", color: T.textFaint, fontSize: 11, padding: "2px 3px", fontFamily: F, fontWeight: 700 } }, "edit"),
                h("button", { onClick: () => deleteSubcategory(activeCatId, s.id), style: { background: "none", border: "none", cursor: "pointer", color: T.textFaint, fontSize: 11, padding: "2px 3px", fontFamily: F, fontWeight: 700 } }, "x")
              )
            )
          ),
          h("div", { style: { display: "flex", gap: 12 } },
            h(KanbanCol, { status: "todo", label: "A faire", tasks: catTodo, tools, color: activeCat.color, onEdit: openTaskEdit, onDrop: moveTask }),
            h(KanbanCol, { status: "doing", label: "En cours", tasks: catDoing, tools, color: activeCat.color, onEdit: openTaskEdit, onDrop: moveTask }),
            h(KanbanCol, { status: "done", label: "Termine", tasks: catDone, tools, color: activeCat.color, onEdit: openTaskEdit, onDrop: moveTask })
          )
        )
      ),

      /* ═══ MODALS ═══ */

      /* Category */
      h(Modal, { open: catModal, onClose: () => setCatModal(false) },
        h("h3", { style: { fontSize: 17, fontWeight: 900, marginBottom: 18, color: T.text } }, catForm.editId ? "Modifier la categorie" : "Nouvelle categorie"),
        h("div", { style: { display: "flex", flexDirection: "column", gap: 14 } },
          h("div", null, h("div", { style: lbl }, "Nom"), h("input", { value: catForm.name, onChange: e => setCatForm({ ...catForm, name: e.target.value }), onKeyDown: e => e.key === "Enter" && saveCategory(), placeholder: "Ex: Juridique annuel", style: inp, autoFocus: true })),
          h("div", null, h("div", { style: lbl }, "Couleur"), h(ColorPicker, { value: catForm.color, onChange: c => setCatForm({ ...catForm, color: c }) })),
          h("div", { style: { display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 6 } },
            h("button", { onClick: () => setCatModal(false), style: btnG }, "Annuler"),
            h("button", { onClick: saveCategory, style: { ...btnP, opacity: catForm.name.trim() ? 1 : 0.35 } }, catForm.editId ? "Enregistrer" : "Creer")
          )
        )
      ),

      /* Subcategory */
      h(Modal, { open: subModal, onClose: () => setSubModal(false) },
        h("h3", { style: { fontSize: 17, fontWeight: 900, marginBottom: 18, color: T.text } }, subForm.editId ? "Modifier la sous-categorie" : "Nouvelle sous-categorie"),
        h("div", { style: { display: "flex", flexDirection: "column", gap: 14 } },
          h("div", null, h("div", { style: lbl }, "Nom"), h("input", { value: subForm.name, onChange: e => setSubForm({ ...subForm, name: e.target.value }), onKeyDown: e => e.key === "Enter" && saveSubcategory(), placeholder: "Ex: Constitution SCI", style: inp, autoFocus: true })),
          h("div", { style: { display: "flex", gap: 8, justifyContent: "flex-end" } },
            h("button", { onClick: () => setSubModal(false), style: btnG }, "Annuler"),
            h("button", { onClick: saveSubcategory, style: { ...btnP, opacity: subForm.name.trim() ? 1 : 0.35 } }, subForm.editId ? "Enregistrer" : "Creer")
          )
        )
      ),

      /* TASK MODAL */
      h(Modal, { open: taskModal, onClose: () => setTaskModal(false), wide: true },
        h("h3", { style: { fontSize: 17, fontWeight: 900, marginBottom: 18, color: T.text } }, taskForm.editId ? "Modifier la tache" : "Nouvelle tache"),
        h("div", { style: { display: "flex", flexDirection: "column", gap: 14 } },
          h("div", null, h("div", { style: lbl }, "Titre *"), h("input", { value: taskForm.title, onChange: e => setTaskForm({ ...taskForm, title: e.target.value }), placeholder: "Titre de la tache", style: inp, autoFocus: true })),

          /* NOTE */
          h("div", { style: { background: T.sectionBg, borderRadius: 12, padding: "14px 16px", border: "1px solid " + T.sectionBorder } },
            h("div", { style: { ...lbl, marginBottom: 8, display: "flex", alignItems: "center", gap: 6 } }, "\uD83D\uDCDD Note"),
            h("textarea", { value: taskForm.note, onChange: e => setTaskForm({ ...taskForm, note: e.target.value }), placeholder: "Contexte, remarques, instructions...", rows: 3, style: { ...inp, resize: "vertical", background: T.card } })
          ),

          /* CHECKLIST */
          h("div", { style: { background: T.sectionBg, borderRadius: 12, padding: "14px 16px", border: "1px solid " + T.sectionBorder } },
            h("div", { style: { ...lbl, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 } },
              "\u2611 To-do list",
              taskForm.checklist.length > 0 && h("span", { style: { fontSize: 10, fontWeight: 700, color: T.textFaint, textTransform: "none", letterSpacing: 0 } },
                "(" + taskForm.checklist.filter(c => c.done).length + "/" + taskForm.checklist.length + ")"
              )
            ),
            taskForm.checklist.length > 0 && h("div", { style: { marginBottom: 10 } },
              h("div", { style: { width: "100%", height: 5, borderRadius: 3, background: T.tagBg, overflow: "hidden" } },
                h("div", { style: { width: (taskForm.checklist.length > 0 ? Math.round((taskForm.checklist.filter(c => c.done).length / taskForm.checklist.length) * 100) : 0) + "%", height: "100%", borderRadius: 3, background: taskForm.checklist.filter(c => c.done).length === taskForm.checklist.length ? "#4CAF7D" : "#E8A838", transition: "width .3s ease" } })
              )
            ),
            taskForm.checklist.length > 0 && h("div", { style: { display: "flex", flexDirection: "column", gap: 4, marginBottom: 10 } },
              ...taskForm.checklist.map(item =>
                h("div", { key: item.id, style: { display: "flex", alignItems: "center", gap: 8, padding: "7px 10px", background: item.done ? T.checkDoneBg : T.card, borderRadius: 8, border: "1px solid " + (item.done ? T.checkDoneBorder : T.borderMed), transition: "all .15s" } },
                  h("button", { onClick: () => toggleCheckItemForm(item.id), style: {
                    width: 22, height: 22, borderRadius: 6, flexShrink: 0, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", transition: "all .15s",
                    background: item.done ? "#4CAF7D" : T.checkBg, border: item.done ? "none" : "2px solid " + T.checkBorder, color: "#fff", fontSize: 12, fontWeight: 900
                  } }, item.done ? "\u2713" : ""),
                  h("input", { value: item.text, onChange: e => editCheckItemText(item.id, e.target.value), style: {
                    flex: 1, border: "none", background: "transparent", outline: "none", fontFamily: F, fontSize: 13, fontWeight: 600,
                    color: item.done ? T.textFaint : T.text, textDecoration: item.done ? "line-through" : "none"
                  } }),
                  h("button", { onClick: () => removeCheckItem(item.id), style: { background: "none", border: "none", cursor: "pointer", color: T.textFaint, fontSize: 18, fontWeight: 700, padding: "0 4px", lineHeight: 1, fontFamily: F },
                    onMouseEnter: e => e.currentTarget.style.color = "#D94F4F",
                    onMouseLeave: e => e.currentTarget.style.color = T.textFaint
                  }, "\u00D7")
                )
              )
            ),
            h("div", { style: { display: "flex", gap: 6 } },
              h("input", { value: taskForm.newCheckItem || "", onChange: e => setTaskForm({ ...taskForm, newCheckItem: e.target.value }),
                onKeyDown: e => { if (e.key === "Enter") { e.preventDefault(); addCheckItem(); } },
                placeholder: "Ajouter un element...", style: { ...inp, flex: 1, padding: "9px 12px", fontSize: 13, background: T.card }
              }),
              h("button", { onClick: addCheckItem, style: { ...btnG, padding: "9px 14px", fontSize: 13, whiteSpace: "nowrap" } }, "+ Ajouter")
            )
          ),

          /* Importance */
          h("div", null,
            h("div", { style: lbl }, "Importance"),
            h("div", { style: { display: "flex", gap: 6 } },
              ...IMPORTANCE.map(i =>
                h("button", { key: i.id, onClick: () => setTaskForm({ ...taskForm, importance: i.id }), style: {
                  padding: "8px 14px", borderRadius: 9, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: F, border: "none", transition: "all .15s",
                  background: taskForm.importance === i.id ? `${i.color}18` : T.btnGhostBg,
                  color: taskForm.importance === i.id ? i.color : T.textMuted,
                  boxShadow: taskForm.importance === i.id ? `0 0 0 2px ${i.color}40` : "none"
                } }, i.label)
              )
            )
          ),

          taskForm.editId && h("div", null,
            h("div", { style: lbl }, "Statut"),
            h("div", { style: { display: "flex", gap: 6 } },
              ...[{ id: "todo", l: "A faire" }, { id: "doing", l: "En cours" }, { id: "done", l: "Termine" }].map(s =>
                h("button", { key: s.id, onClick: () => setTaskForm({ ...taskForm, status: s.id }), style: {
                  padding: "8px 14px", borderRadius: 9, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: F, border: "none",
                  background: taskForm.status === s.id ? T.btnPrimBg : T.btnGhostBg,
                  color: taskForm.status === s.id ? T.btnPrimText : T.textMuted
                } }, s.l)
              )
            )
          ),

          cats.length > 0 && h("div", null,
            h("div", { style: lbl }, "Categorie"),
            h("select", { value: taskForm.catId || "", onChange: e => setTaskForm({ ...taskForm, catId: e.target.value || null, subId: null }), style: inp },
              h("option", { value: "" }, "-- Tache rapide --"),
              ...cats.map(c => h("option", { key: c.id, value: c.id }, c.name))
            )
          ),

          (() => { const formCat = taskForm.catId ? getCat(taskForm.catId) : null; return formCat && formCat.subs.length > 0 ? h("div", null,
            h("div", { style: lbl }, "Sous-categorie"),
            h("select", { value: taskForm.subId || "", onChange: e => setTaskForm({ ...taskForm, subId: e.target.value || null }), style: inp },
              h("option", { value: "" }, "-- Aucune --"),
              ...formCat.subs.map(s => h("option", { key: s.id, value: s.id }, s.num + ". " + s.name))
            )
          ) : null; })(),

          h("div", null, h("div", { style: lbl }, "Echeance (optionnel)"), h("input", { type: "date", value: taskForm.dueDate, onChange: e => setTaskForm({ ...taskForm, dueDate: e.target.value }), style: inp })),

          h("div", null,
            h("div", { style: lbl }, "Outils impliques (optionnel)"),
            h("div", { style: { display: "flex", gap: 5, flexWrap: "wrap" } },
              ...tools.map(t => {
                const a = taskForm.tools.includes(t.id);
                return h("button", { key: t.id, onClick: () => setTaskForm({ ...taskForm, tools: a ? taskForm.tools.filter(x => x !== t.id) : [...taskForm.tools, t.id] }), style: {
                  padding: "7px 13px", borderRadius: 8, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: F,
                  background: a ? T.btnPrimBg : T.btnGhostBg, color: a ? T.btnPrimText : T.textSoft,
                  border: a ? "none" : "1px solid " + T.borderMed, transition: "all .15s"
                } }, t.name);
              })
            )
          ),

          h("div", { style: { display: "flex", gap: 8, justifyContent: "space-between", marginTop: 6 } },
            h("div", null, taskForm.editId && h("button", { onClick: () => deleteTask(taskForm.editId), style: { ...btnG, color: "#D94F4F", borderColor: "rgba(217,79,79,0.25)" } }, "Supprimer")),
            h("div", { style: { display: "flex", gap: 8 } },
              h("button", { onClick: () => setTaskModal(false), style: btnG }, "Annuler"),
              h("button", { onClick: saveTask, style: { ...btnP, opacity: taskForm.title.trim() ? 1 : 0.35 } }, taskForm.editId ? "Enregistrer" : "Creer")
            )
          )
        )
      ),

      /* Tools Modal */
      h(Modal, { open: settingsModal, onClose: () => setSettingsModal(false) },
        h("h3", { style: { fontSize: 17, fontWeight: 900, marginBottom: 18, color: T.text } }, "Gestion des outils"),
        h("div", { style: { display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 } },
          ...tools.map(t =>
            h("div", { key: t.id, style: { display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", background: T.sectionBg, borderRadius: 9, border: "1px solid " + T.sectionBorder } },
              h("span", { style: { flex: 1, fontSize: 14, fontWeight: 700, color: T.text } }, t.name),
              h("button", { onClick: () => setToolForm({ name: t.name, editId: t.id }), style: { background: "none", border: "none", cursor: "pointer", fontSize: 12, color: T.textFaint, fontWeight: 700, fontFamily: F } }, "Editer"),
              h("button", { onClick: () => deleteTool(t.id), style: { background: "none", border: "none", cursor: "pointer", fontSize: 12, color: "#D94F4F", fontWeight: 700, fontFamily: F } }, "Suppr.")
            )
          ),
          tools.length === 0 && h("div", { style: { fontSize: 13, color: T.textFaint, fontWeight: 600, padding: 8 } }, "Aucun outil configure")
        ),
        h("div", { style: { display: "flex", gap: 8 } },
          h("input", { value: toolForm.name, onChange: e => setToolForm({ ...toolForm, name: e.target.value }), onKeyDown: e => e.key === "Enter" && saveTool(), placeholder: "Nom de l'outil", style: { ...inp, flex: 1 } }),
          h("button", { onClick: saveTool, style: { ...btnP, whiteSpace: "nowrap" } }, toolForm.editId ? "Modifier" : "Ajouter")
        ),
        toolForm.editId && h("button", { onClick: () => setToolForm({ name: "", editId: null }), style: { ...btnG, marginTop: 8, width: "100%" } }, "Annuler la modification")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
